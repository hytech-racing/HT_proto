syntax = "proto3";
package hytech_msgs;
import "base_msgs.proto";

message MCUProtoVersion
{
    bytes proto_version = 1;
}

message VCRProtoVersion
{
    bytes proto_version = 1;
}

message VCFProtoVersion
{
    bytes proto_version = 1;
}

message DBProtoVersion
{
    bytes proto_version = 1;
}

message Versions {
    uint32 ht_can_version = 1;
    bytes ht_proto_version = 2;
}

message SpeedControlIn {
    float accel_percent = 1;
    float brake_percent = 2;
}

message MCUOutputData
{
    float accel_percent = 1;
    float brake_percent = 2;
    veh_vec_float rpm_data = 3;
    int64 MCU_recv_millis = 4;
    float steering_angle_deg = 5;
    veh_vec_int load_cell_data = 6;
    bool timing_failure_active = 7;
    int32 round_trip_time_millis = 8;
}

message MCUCommandData
{
    veh_vec_float desired_rpms = 1;
    veh_vec_float torque_limit_nm = 2;
    int64 prev_MCU_recv_millis = 3;
}

message VNData
{
    xyz_vector vn_vel_m_s = 1;
    xyz_vector vn_linear_accel_m_ss = 2;
    xyz_vector vn_linear_accel_uncomp_m_ss = 3;
    xyz_vector vn_angular_rate_rad_s = 4;
    ypr_vector vn_ypr_rad = 5;
    GPS_data vn_gps = 6;
    vn_status status = 7;
}

message VnImuData
{
    uint64 host_timestamp_ns = 1;
    uint64 vn_time_startup_ns = 2;

    xyz_vector uncomp_accel_sensor_frd_m_ss = 3;
    xyz_vector uncomp_gyro_sensor_frd_rad_s = 4;

    xyz_vector uncomp_accel_vehicle_frd_m_ss = 5;
    xyz_vector uncomp_gyro_vehicle_frd_rad_s = 6;

    xyz_vector uncomp_accel_vehicle_flu_m_ss = 7;
    xyz_vector uncomp_gyro_vehicle_flu_rad_s = 8;

    xyz_vector comp_accel_sensor_frd_m_ss = 9;
    xyz_vector comp_gyro_sensor_frd_rad_s = 10;

    xyz_vector comp_accel_vehicle_frd_m_ss = 11;
    xyz_vector comp_gyro_vehicle_frd_rad_s = 12;

    xyz_vector comp_accel_vehicle_flu_m_ss = 13;
    xyz_vector comp_gyro_vehicle_flu_rad_s = 14;

    xyz_vector comp_no_gravity_accel_sensor_frd_m_ss = 15;
    xyz_vector comp_no_gravity_accel_vehicle_frd_m_ss = 16;
    xyz_vector comp_no_gravity_accel_vehicle_flu_m_ss = 17;

    float dt_s = 18;
}

message VnYprData
{
    uint64 timestamp_ns = 1;

    ypr_vector ypr_deg = 2;
}

message VnGnss
{
    uint64 tow_ns = 1;
    uint32 week = 2;
    uint32 num_sats = 3;
    
    uint32 fix = 4;

    double lat_deg = 5;
    double lon_deg = 6;
    double alt_m = 7;

    xyz_vector vel_ned_ms = 8;
    xyz_vector posu_ned_m = 9;

    float velu_m_s = 10;

    uint32 time_status = 11;
    int32 leap_seconds = 12;

}

message VnDualGnssData
{
    uint64 host_timestamp_ns = 1;
    uint64 vn_time_startup_ns = 2;

    VnGnss gnss1 = 3;
    VnGnss gnss2 = 4;
}

message VnInsData
{
    uint64 timestamp_ns = 1;

    vn_status ins_status = 2;

    double lat_deg = 3;
    double lon_deg = 4;
    double alt_m = 5;

    xyz_vector vel_body_sensor_frd_m_s = 6;
    xyz_vector vel_body_vehicle_frd_m_s = 7;
    xyz_vector vel_body_vehicle_flu_m_s = 8;

    xyz_vector vel_ned_m_s = 9;

    float posu_m = 10;

    float velu_m_s = 11;
}
message EkfState
{
    uint64 time_startup_ns = 1;
    bool initialized = 2;

    // Vehicle FRD EKF state
    double vx_vehicle_frd_m_s = 3;
    double vy_vehicle_frd_m_s = 4;
    double yaw_vehicle_frd_rad = 5;

    // Vehicle FLU convenience output
    double vx_vehicle_flu_m_s = 6;
    double vy_vehicle_flu_m_s = 7;
    double yaw_vehicle_flu_rad = 8;

    // Position in NED
    double position_n_m = 9;
    double position_e_m = 10;

    // Startup frame to NED/north alignment, uses same convention as EKF yaw state
    double alpha_startup_to_ned_rad = 11;

    // Corrected IMU in vehicle FRD
    double ax_corrected_vehicle_frd_m_s2 = 12;
    double ay_corrected_vehicle_frd_m_s2 = 13;
    double yaw_rate_corrected_vehicle_frd_rad_s = 14;

    // Corrected IMU in vehicle FLU
    double ax_corrected_vehicle_flu_m_s2 = 15;
    double ay_corrected_vehicle_flu_m_s2 = 16;
    double yaw_rate_corrected_vehicle_flu_rad_s = 17;

    // Estimated biases in vehicle FRD
    double bias_gyro_vehicle_frd_rad_s = 18;
    double bias_ax_vehicle_frd_m_s2 = 19;
    double bias_ay_vehicle_frd_m_s2 = 20;

    double last_imu_dt_s = 21;
}


enum EkfInitStatus
{
    EKF_INIT_STATUS_UNSPECIFIED = 0;
    EKF_INIT_STATUS_WAITING = 1;
    EKF_INIT_STATUS_IN_PROGRESS = 2;
    EKF_INIT_STATUS_DONE = 3;
    EKF_INIT_STATUS_FAILED = 4;
}

message EkfDebugSnapshot
{
    // Snapshot message, not event-triggered.
    uint64 time_startup_ns = 1;

    // Initialization status
    EkfInitStatus imu_status = 2;
    EkfInitStatus gnss1_status = 3;
    EkfInitStatus gnss2_status = 4;
    EkfInitStatus alpha_status = 5;

    // IMU initialization progress
    uint32 imu_sample_count = 6;
    uint32 imu_required_samples = 7;
    double imu_init_progress = 8;

    // GNSS1 initialization progress
    uint32 gnss1_sample_count = 9;
    uint32 gnss1_required_samples = 10;
    double gnss1_init_progress = 11;

    // GNSS2 initialization progress
    uint32 gnss2_sample_count = 12;
    uint32 gnss2_required_samples = 13;
    double gnss2_init_progress = 14;

    // Stationary detection
    bool stationary_detected = 15;

    // Zero-velocity update debug
    bool latest_zero_vel_update_enabled = 16;
    bool latest_zero_vel_update_accepted = 17;
    double latest_zero_vel_nis = 18;
    double latest_zero_vel_gate = 19;

    // Zero-lateral-velocity update debug
    bool latest_zero_lat_vel_update_enabled = 20;
    bool latest_zero_lat_vel_update_accepted = 21;
    double latest_zero_lat_vel_nis = 22;
    double latest_zero_lat_vel_gate = 23;
    double latest_zero_lat_vel_sigma_used = 24;
    double latest_zero_lat_vel_residual = 25;

    // GNSS1 speed update debug
    bool latest_gnss1_speed_update_enabled = 26;
    bool latest_gnss1_speed_update_accepted = 27;
    double latest_gnss1_speed_nis = 28;
    double latest_gnss1_speed_gate = 29;
    double latest_gnss1_speed_residual = 30;

    // GNSS1 velocity update debug
    bool latest_gnss1_vel_update_enabled = 31;
    bool latest_gnss1_vel_update_accepted = 32;
    double latest_gnss1_vel_nis = 33;
    double latest_gnss1_vel_gate = 34;
    double latest_gnss1_vel_ned_n_residual = 35;
    double latest_gnss1_vel_ned_e_residual = 36;

    // GNSS1 position update debug
    bool latest_gnss1_pos_update_enabled = 37;
    bool latest_gnss1_pos_update_accepted = 38;
    double latest_gnss1_pos_nis = 39;
    double latest_gnss1_pos_gate = 40;
    double latest_gnss1_pos_ned_n_residual = 41;
    double latest_gnss1_pos_ned_e_residual = 42;

    // GNSS2 speed update debug
    bool latest_gnss2_speed_update_enabled = 43;
    bool latest_gnss2_speed_update_accepted = 44;
    double latest_gnss2_speed_nis = 45;
    double latest_gnss2_speed_gate = 46;
    double latest_gnss2_speed_residual = 47;

    // GNSS2 velocity update debug
    bool latest_gnss2_vel_update_enabled = 48;
    bool latest_gnss2_vel_update_accepted = 49;
    double latest_gnss2_vel_nis = 50;
    double latest_gnss2_vel_gate = 51;
    double latest_gnss2_vel_ned_n_residual = 52;
    double latest_gnss2_vel_ned_e_residual = 53;

    // GNSS2 position update debug
    bool latest_gnss2_pos_update_enabled = 54;
    bool latest_gnss2_pos_update_accepted = 55;
    double latest_gnss2_pos_nis = 56;
    double latest_gnss2_pos_gate = 57;
    double latest_gnss2_pos_ned_n_residual = 58;
    double latest_gnss2_pos_ned_e_residual = 59;

    // Measurement sigma actually used after applying floors / fallbacks
    double latest_gnss1_speed_sigma_used = 60;
    double latest_gnss1_vel_sigma_used = 61;
    double latest_gnss1_pos_sigma_used = 62;

    double latest_gnss2_speed_sigma_used = 63;
    double latest_gnss2_vel_sigma_used = 64;
    double latest_gnss2_pos_sigma_used = 65;

    // Latest GNSS measurement validity flags
    bool latest_gnss1_vel_valid = 66;
    bool latest_gnss1_pos_valid = 67;

    bool latest_gnss2_vel_valid = 68;
    bool latest_gnss2_pos_valid = 69;
}

message WeighScaleData
{
    float weight_lf = 1;
    float weight_rf = 2;
    float weight_lr = 3;
    float weight_rr = 4;
}

message VehicleData
{
    bool is_ready_to_drive = 1;
    SpeedControlIn current_inputs = 2;
    xyz_vector current_body_vel_ms = 3;
    xyz_vector current_body_accel_mss = 4;
    xyz_vector current_angular_rate_rads = 5;
    ypr_vector current_ypr_rad = 6;
    veh_vec_float current_rpms = 7;
    bool state_is_valid = 8;
    int64 prev_MCU_recv_millis = 9;
    float steering_angle_deg = 10;
    TireDynamics tire_dynamics = 11;
    veh_vec_float driver_torque = 12;
    float v_y_lm = 13;
    float psi_dot_lm_rad_s = 14;
    TorqueVectoringStatus tv_status = 15;
    PowerLimitStatus power_limit_status = 16;
    float electrical_power_watts = 17;
    bool is_using_torque_controller = 18;
    veh_vec_float suspension_potentiometers_mm = 19;
    veh_vec_float current_torques_nm = 20;
    float old_energy_meter_kw = 21;
}

message LapTime
{
    float laptime_seconds = 1;
    int64 lapcount = 2;
}


//define structs 

/**
 * All system AND interface data in VCF. VCF systems will place data in some of the nested structs, while
 * systems will place data in some of the other structs.
 */
message VCFData_s
{
    FrontLoadCellData_s front_loadcell_data = 1;
    FrontSusPotData_s front_suspot_data = 2;
    SteeringSensorData_s steering_data = 3;
    BrakePressureSensorData_s brake_pressure_data = 4;
    BrakeRotorTempSensorData_s brake_rotor_temp_data = 5;
    DashInputState_s dash_input_state = 6; // Direct button signals from the dashboard IOExpander
    VCFEthernetLinkData_s vcf_ethernet_link_data = 7;
	SteeringSystemData_s steering_system_data = 8;
    PedalsSystemData_s pedals_system_data = 9;
    VCFShutdownSensingData_s vcf_shutdown_data = 10;
    FWVersionInfo_s firmware_version_info = 11;
    Versions msg_versions = 12;
}

message FWVersionInfo_s
{
    string git_hash = 1;
    bool project_on_main_or_master = 2;
    bool project_is_dirty = 3;
}

/**
 * All system AND interface data in VCR. VCR systems will place data in some of the nested structs, while
 * systems will place data in some of the other nested structs.
 */
message VCRData_s
{
    RearLoadCellData_s rear_loadcell_data = 1;
    RearSusPotData_s rear_suspot_data = 2;
    VCRShutdownSensingData_s vcr_shutdown_data = 3;
    VCREthernetLinkData_s ethernet_is_linked = 4;
    veh_vec_inverter inverter_data = 5;
    CurrentSensorData_s current_sensor_data = 6;
    DrivetrainDynamicReport_s drivetrain_data = 9;
    bool buzzer_is_active = 10;
    TorqueControllerMuxStatus_s tcmux_status = 11;
    FWVersionInfo_s firmware_version_info = 12;
    Versions msg_versions = 13;
    float measured_glv = 14;
    VCRStatus status = 15;
    VCRLOC vcr_loc_data = 16;
    
}

/**
 * Minimum data that the ACU must send for the car to run. Detailed temps/voltages are not minimum-viable. The
 * ACUAllData message contains an instance of the data in this ACUCoreData struct.
 */
message ACUCoreData
{
    float pack_voltage = 1;
    float min_cell_voltage = 2;
    float avg_cell_voltage = 3;
    float max_cell_voltage = 4;
    float max_cell_temp = 5;
    float max_board_temp = 6;
    float max_measured_pack_voltage = 7; // sensed by ACU's internal ADC - measured pack out voltage
    float max_measured_tractive_system_voltage = 8; // sensed by ACU's internal ADC - measured tractive system voltage
    float max_measured_glv = 9; // max measured global low voltage from teensy
    float min_measured_glv = 10; // lowest measured glv voltage from teensy 
    float min_measured_pack_voltage = 11; // lowest pack voltage measured
    float min_measured_tractive_system_voltage = 12; // lowest tractive system voltage measured
    float min_measured_shdn_out_voltage = 13; // lowest shutdown out voltage read from teensy
    float hv_plus_out_voltage = 14; // pack out voltage is within range - relevant during precharge
    float main_ok_voltage = 15; // voltage that determines if high side contactor closes when shutdown is high
    float precharge_ok_voltage = 19; // 
    float main_under_threshold_voltage = 16; // output of MAIN_OK's hysteresis
    float precharge_under_threshold_voltage = 17; // output of PRECHARGE_OK's hysteresis
    float tractive_system_current = 18; // 14-bit ADC DC Bus Current in Amps
    ACUState_e acu_state = 20; // adding in acu state

    bool low_side_contactor_welded = 21; 
    bool high_side_contactor_welded = 22; 
}

/**
 * ACUAllData contains the detailed, unprocessed data from ACU sensors.
 */
message ACUAllData
{
    ACUCoreData core_data = 1; 
    uint32 max_consecutive_invalid_packet_count = 2; // maximum consecutive invalid packet count across all chips
    uint32 max_cell_voltage_id = 3; // refer to this bookstack page for reference about translating id to location: https://wiki.hytechracing.org/books/ht09-design/page/ht09-ams-isospi-bus-bar-layout-in-accumulator-Du5
    uint32 min_cell_voltage_id = 4; // see max_cell_voltage_id docs
    uint32 max_cell_temp_id = 5; // see max_cell_voltage_id docs
    float measured_bspd_current = 8; // measured bspd current
    FWVersionInfo_s firmware_version_info = 9;
    float valid_packet_rate = 10; // percentage of packets that are valid - given from 0.0 to 1.0
    float SoC = 11; // calculated state of charge / battery percentage - given from 0.0 to 1.0
    float SoH = 12; // calculated state of health of battery pack - given from 0.0 to 1.0
    Versions msg_versions = 17;
    bool shutdown_has_gone_low = 18;
    repeated float cell_voltages = 13;
    repeated float cell_temperatures = 14;
    repeated float board_temperatures = 15;
    repeated uint32 invalid_packet_chip_counts = 16; // consecutive number of invalid packets received per chip
}

message AeroData {
    repeated float readings_pa = 1;
}

message McapInfo {
    string current_mcap = 1;
}
